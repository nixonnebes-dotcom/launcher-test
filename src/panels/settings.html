<div class="container">
    <div class="settings-card">
        <div class="settings-header">
            <div class="settings-title">SETTINGS</div>
            <div class="settings-close">✕</div>
        </div>

        <div class="settings-section">
            <div class="settings-label">RAM Allocation (GB)</div>
            <div class="ram-slider-row">
                <input type="range" class="ram-slider" min="0.5" max="8" step="0.5" value="2">
                <span class="ram-value">2.0GB</span>
            </div>
            <div class="ram-meta">Detected: <span class="ram-total">0</span>GB · Recommended: <span class="ram-recommended">0</span>GB</div>
        </div>

        <div class="settings-section">
            <div class="settings-label">Resolution</div>
            <div class="resolution-row">
                <input type="number" class="width-size resolution-mini">
                <span class="resolution-cross">×</span>
                <input type="number" class="height-size resolution-mini">
                <div class="resolution-reset-mini">Default</div>
            </div>
        </div>

        <div class="open-dir-btn">Open Directory</div>

        <div class="settings-actions">
            <div class="settings-save-btn disabled">Save Changes</div>
            <div class="settings-cancel-btn">Cancel</div>
        </div>
    </div>
</div>
