<div class="container">

    <!-- Sidebar lateral angosta -->
    <div class="side-nav">
        <div class="side-nav-top">
            <img class="side-logo" src="assets/images/icon/icon.png">
        </div>

        <div class="side-nav-bottom">
            <div class="side-btn add-account-btn" id="add">
                <div class="icon-account-add"></div>
            </div>
            <div class="player-head"></div>
        </div>
    </div>

    <!-- Botón de ajustes, arriba a la derecha junto a los controles de ventana -->
    <div class="settings-btn icon-settings"></div>

    <!-- Estado del servidor, arriba a la izquierda -->
    <div class="status-server">
        <img class="server-status-icon" src="assets/images/icon/icon.png">
        <div class="server-status-infos">
            <div class="server-status-name">Minecraft</div>
            <div class="server-status-text">operationeel - 0 ms</div>
        </div>
        <div class="status-player-count">
            <div class="player-count">0</div>
        </div>
    </div>

    <!-- Zona de juego / play button abajo a la derecha -->
    <div class="play-zone">
        <div class="play-elements">
            <div class="play-instance">
                <button class="play-btn">INICIAR</button>
                <div class="instance-select">☰</div>
            </div>
            <div class="info-starting-game">
                <div class="info-starting-game-text">Connecting...</div>
                <progress value="0" max="0" class="progress-bar"></progress>
            </div>
        </div>
    </div>

    <div class="accounts-popup">
        <div class="accounts-tab">
            <div class="accounts-tab-title">Cuentas</div>
            <div class="accounts-list content-scroll"></div>
        </div>
    </div>

    <div class="instance-popup">
        <div class="instances-tab">
            <div class="close-popup icon-close"></div>
            <p>Instances</p>
            <div class="instances-List"></div>
        </div>
    </div>
</div>
